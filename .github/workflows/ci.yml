name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a newer commit arrives for the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + format + audit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier format
        id: format
        run: |
          npm run format
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Commit formatting fixes
        if: >
          steps.format.outputs.changed == 'true'
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-format with prettier"
          git push origin HEAD:${{ github.head_ref }}

      - name: Fail on formatting drift (non-PR or fork)
        if: >
          steps.format.outputs.changed == 'true'
          && (github.event_name != 'pull_request'
              || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "Formatting drift detected; auto-commit not available in this context." >&2
          git diff
          exit 1

      - name: ESLint
        run: npm run lint

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  test:
    name: Test + build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --reporter=github-actions --reporter=default

      - name: Coverage (Node 22 only)
        if: matrix.node == 22
        run: npm run test:coverage -- --reporter=default
        continue-on-error: true

      - name: Build (vite)
        run: npx vite build

      - name: Upload dist artifact (Node 22 only)
        if: matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
